<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio</title>
</head>
<body>
    <h1>Audio Example</h1>
    <audio controls>
        <source src="./rid.wav" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>
    <audio controls autoplay loop>
        <source src="./rid.wav" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>
    <audio controls loop>
        <source src="./rid.wav" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>
<audio controls muted   >
        <source src="./rid.wav" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>
    <a href="./rid.wav" download>Download Audio</a>
    
</body>
</html>
