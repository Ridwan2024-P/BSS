<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkbox</title>
</head>
<body>
    <h1>Favorite Programming Languages</h1>
    <form>
    <label>
        <input type="checkbox" name="language" value="Python"> Python
    </label>
    <br>
    <label>
        <input type="checkbox" name="language" value="JavaScript" disabled> JavaScript</label>
    <br>
    <label>
        <input type="checkbox" name="language" value="Java"> Java</label>
     <br>
    <label>
        <input type="checkbox" name="language" value="C++"> C++</label>
     <br>
    <input type="submit" value="Submit">
    </form>

    <form>
        <label>
            <input type="radio" name="color" value="Red"> Red
        </label><br>
        <label>
            <input type="radio" name="color" value="Green"> Green
        </label><br>
        <label>
            <input type="radio" name="color" value="Blue"> Blue
        </label>
        <label>
            <input type="Submit" value="Submit">
        </label>
    </form>


    <h1>Choose your favorite color</h1>
    <form>
        <label> Red
            <input type="color" name="color" value="Red">
        </label><br><br>

        <label>Date
            <input type="date" name="date">
        </label><br><br>
       
        <label >Time
            <input type="time" name="time">
        </label><br><br>
         <label >Week
            <input type="week" name="week"> 
        </label><br><br>
        <label >Month
            <input type="month" name="month"> 
        </label><br><br>
         <label >Range
            <input type="range" name="range" min="0" max="100">
        </label><br><br>
        <label>Url
            <input type="url" name="url" placeholder="Enter a URL">
        </label><br><br>
         <input type="submit" value="Submit">
    </form>
</body>
</html>
