<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global</title>
</head>
<body>
    <h2 class="text-tx">Heading 1</h2>
    <h2 id="main-heading">Heading 2</h2>
    <p style="color:red; font-size:16px;">This is a paragraph.</p>
    <button accesskey="h" onclick="alert('Home clicked!')">Home</button>
    <!-- Hidden -->
        <div hidden>This content is hidden.</div>
        <!-- Tabindex -->
        <button tabindex="0">Button 1</button>
        <button tabindex="1">Button 2</button>
        <button tabindex="2">Button 3</button>
        <button tabindex="3">Button 4</button>
        <button tabindex="4">Button 5</button>

        <!-- Contenteditable -->

        <div contenteditable="true">
            This is an editable div. Click here to edit the content.
        </div>

        <!-- Draggable -->
        <div draggable="true">
            This is a draggable div. Drag me around.
        </div>
        <!-- Autofocus -->
        <input type="text" autofocus>
        

</body>
</html>
