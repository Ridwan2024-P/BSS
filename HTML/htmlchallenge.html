<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Html Form Challenge</title>
</head>
<body>
    <header>
        <h1>Appartment Search</h1>
    </header>
    <form action="">
        <label for="Location">Location:
            <input type="text" id="Location" name="Location"  required>
        </label><br><br>
        <label for="MonthlyPrice">Price:
          <input type="range" id="MonthlyPrice" name="MonthlyPrice" min="0" max="5000"  required>
        </label><br><br>
        <label for="Number Of Bedrooms">Bedrooms:
            <input type="number" id="NumberOfBedrooms" name="NumberOfBedrooms"  required>
        </label>
        <br><br>
         <label for="Number Of Bathrooms">Bathrooms:
            <input type="number" id="NumberOfBathrooms" name="NumberOfBathrooms"  required>
        </label>
        <br><br>
        <label for="pets">Pets
            <input type="checkbox" id="pets" name="pets">
        </label><br><br>
        <label for="DateAvailable"> Date Available:
            <input type="date" id="DateAvailable" name="DateAvailable" required>
        </label><br><br>
        <input type="submit" value="Search">
    </form>

    
</body>
</html>
