<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Popover</title>
</head>
<body>
    <button popovertarget="my-popover">Toggle Popover</button>
    <div id="my-popover" popover>
        <p>This is a popover content.</p>
        <button popovertarget="my-popover">Close</button>
    </div>
    <details>
        <summary>More Info</summary>
        <p>This is additional information that can be toggled.</p>
    </details>

</body>

    
</body>
</html>
