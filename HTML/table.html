<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
</head>
<body>
    <h1>Table Example</h1>
    <table >
        <colgroup>
            <col style="background-color: rgb(33, 198, 58);">
             <col style="background-color: rgb(19, 163, 203);">
       <col style="background-color: rgb(203, 168, 230);">
        <col style="background-color: rgba(158, 51, 104, 0.581);">
      
      
            
           
        </colgroup>
        
        <thead>
            <tr>
                <th>Name</th>
                <th>Math</th>
                <th>Science</th>
                <th>Literature</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Alice</td>
                <td>85</td>
                <td>90</td>
                <td>88</td>
            </tr>
            <tr>
                <td>Bob</td>
                <td>78</td>
                <td>82</td>
                <td>80</td>
            </tr>
            <tr>
                <td>Charlie</td>
                <td>92</td>
                <td>88</td>
                <td>91</td>
            </tr>
        </tbody>
    </table>
    
</body>
</html>
